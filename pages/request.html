<!doctype html>
<html lang="az">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hotel 50 GitHub Sorğusu</title>
    <style>
      :root {
        --bg: #edf5f0;
        --panel: #ffffff;
        --line: #c8e0d4;
        --brand: #123c33;
        --muted: #526b5c;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(160deg, rgba(6,42,32,.82), rgba(16,24,20,.68)),
          url("https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/Shusha_general_view.jpg/1280px-Shusha_general_view.jpg");
        background-position: center;
        background-size: cover;
        font-family: Arial, Helvetica, sans-serif;
        color: #141f18;
      }
      main {
        width: min(860px, 100%);
        padding: 28px;
        border: 1px solid rgba(190,152,86,.34);
        border-radius: 8px;
        background: rgba(255,255,255,.96);
      }
      h1 { margin: 0 0 10px; color: var(--brand); font-size: 34px; }
      p { color: var(--muted); line-height: 1.55; }
      form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        margin-top: 22px;
      }
      label {
        display: grid;
        gap: 8px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--muted);
      }
      .wide { grid-column: 1 / -1; }
      input, textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font: inherit;
      }
      textarea { min-height: 110px; resize: vertical; }
      button, a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border: 0;
        border-radius: 6px;
        background: var(--brand);
        color: #fff;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }
      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 20px;
      }
      .note {
        margin-top: 16px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #f6fbf8;
      }
      @media (max-width: 700px) {
        form { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hotel 50 Sorğu Forması</h1>
      <p>Bu səhifə yalnız GitHub resursundan istifadə edir. Sorğu GitHub repo-da issue kimi yaradılır.</p>

      <form id="requestForm">
        <label>Ad soyad<input name="full_name" required></label>
        <label>Telefon<input name="phone"></label>
        <label>Giriş tarixi<input name="check_in" type="date"></label>
        <label>Çıxış tarixi<input name="check_out" type="date"></label>
        <label>Nəfər sayı<input name="people_count" type="number" min="1" value="1"></label>
        <label>Otaq/Qeyd<input name="room_note" placeholder="İstək və ya otaq qeydi"></label>
        <label class="wide">Əlavə qeyd<textarea name="note"></textarea></label>
        <div class="wide actions">
          <button type="submit">GitHub-da sorğu yarat</button>
          <a class="button" href="/Hotel50/">Geri qayıt</a>
        </div>
      </form>

      <div class="note">
        Sorğu yaradıldıqdan sonra GitHub yeni issue səhifəsi açılacaq. Orada yalnız `Create issue` düyməsini basmaq qalacaq.
      </div>
    </main>

    <script>
      const form = document.getElementById("requestForm");
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const data = Object.fromEntries(new FormData(form).entries());
        const title = `Booking request: ${data.full_name || "Guest"}`;
        const body = [
          "New booking request",
          "",
          `Full name: ${data.full_name || ""}`,
          `Phone: ${data.phone || ""}`,
          `Check-in: ${data.check_in || ""}`,
          `Check-out: ${data.check_out || ""}`,
          `People count: ${data.people_count || ""}`,
          `Room note: ${data.room_note || ""}`,
          "",
          "Note:",
          data.note || "",
        ].join("\n");
        const url = "https://github.com/faridasadov/Hotel50/issues/new"
          + `?title=${encodeURIComponent(title)}`
          + `&body=${encodeURIComponent(body)}`;
        window.open(url, "_blank", "noopener");
      });
    </script>
  </body>
</html>
